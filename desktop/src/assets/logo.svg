<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cowboy Investor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2944"/>
      <stop offset="100%" stop-color="#0a1f3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1c891"/>
      <stop offset="55%" stop-color="#d4b56b"/>
      <stop offset="100%" stop-color="#c7a44a"/>
    </linearGradient>
  </defs>

  <!-- Rounded navy background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <rect x="40" y="40" width="432" height="432" rx="80" ry="80" fill="none"
        stroke="#c7a44a" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Cowboy hat -->
  <g transform="translate(256 196)">
    <!-- Brim -->
    <ellipse cx="0" cy="40" rx="158" ry="24" fill="url(#gold)"/>
    <!-- Brim shadow underneath -->
    <ellipse cx="0" cy="46" rx="158" ry="14" fill="#0a1f3d" fill-opacity="0.35"/>
    <!-- Crown -->
    <path d="M -86 38
             C -86 -28, -54 -68, 0 -68
             C 54 -68, 86 -28, 86 38
             Z"
          fill="url(#gold)"/>
    <!-- Crown crease -->
    <path d="M -34 -42 C -18 -54, 18 -54, 34 -42 C 18 -30, -18 -30, -34 -42 Z"
          fill="#0a1f3d" fill-opacity="0.22"/>
    <!-- Hat band -->
    <path d="M -98 30 C -60 18, 60 18, 98 30 L 98 42 C 60 30, -60 30, -98 42 Z"
          fill="#0a1f3d" fill-opacity="0.55"/>
    <!-- Band buckle -->
    <rect x="-8" y="22" width="16" height="14" rx="2" fill="#e1c891"/>
  </g>

  <!-- Rising chart line under hat -->
  <g stroke="url(#gold)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="120,380 200,338 268,358 332,294 412,250"/>
  </g>
  <!-- Arrow head -->
  <polygon points="412,250 372,238 396,212" fill="url(#gold)"/>
  <!-- Data dots -->
  <g fill="#0a1f3d" stroke="url(#gold)" stroke-width="6">
    <circle cx="200" cy="338" r="9"/>
    <circle cx="268" cy="358" r="9"/>
    <circle cx="332" cy="294" r="9"/>
  </g>

  <!-- Baseline -->
  <line x1="96" y1="416" x2="416" y2="416"
        stroke="#c7a44a" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
</svg>
